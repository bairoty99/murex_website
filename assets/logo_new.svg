<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" dir="ltr">
  <defs>
    <!-- Gradients -->
    <linearGradient id="emblemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#009ee0" />     <!-- Brand Blue -->
      <stop offset="50%" stop-color="#7b2cbf" />    <!-- Purple -->
      <stop offset="100%" stop-color="#e22a7a" />   <!-- Brand Pink -->
    </linearGradient>
    
    <!-- Mask for the Gear to cut it open and have a clean center -->
    <mask id="gearMask">
      <!-- Keep everything white -->
      <rect x="0" y="0" width="80" height="80" fill="white" />
      <!-- Cut out center circle -->
      <circle cx="40" cy="40" r="16" fill="black" />
      <!-- Cut out right section to mimic open gear -->
      <!-- A pie wedge from -60 deg to 45 deg -->
      <path d="M 40,40 L 80,15 A 40,40 0 0,1 78,58 Z" fill="black" />
    </mask>
  </defs>

  <!-- EMBLEM -->
  <!-- Gear Group with Mask -->
  <g mask="url(#gearMask)">
    <!-- Outer teeth (overlapping rounded rectangles rotated) -->
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(30 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(60 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(90 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(120 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(150 40 40)" />
    <!-- Main body ring -->
    <circle cx="40" cy="40" r="23" fill="url(#emblemGrad)" />
  </g>

  <!-- PCB & Microprocessor & Spark Segment -->
  <g>
    <!-- Dashed Outer Layout Line -->
    <circle cx="40" cy="40" r="22" fill="none" stroke="#009ee0" stroke-width="1.2" stroke-dasharray="2,3" class="logo-stroke-adapt" opacity="0.4" />
    
    <!-- Electric Spark (Left side) -->
    <path d="M 33,28 L 27,39 H 33 L 27,50" fill="none" stroke="#009ee0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="logo-stroke-adapt" />
    
    <!-- Microprocessor (Right side) -->
    <!-- IC Body -->
    <rect x="47" y="34" width="11" height="11" rx="1.5" fill="none" stroke="#009ee0" stroke-width="1.8" class="logo-stroke-adapt" />
    <rect x="50" y="37" width="5" height="5" rx="0.5" fill="#009ee0" class="logo-text-adapt" opacity="0.7" />
    <!-- Pins -->
    <!-- Left Pins -->
    <line x1="43" y1="36.5" x2="47" y2="36.5" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="43" y1="39.5" x2="47" y2="39.5" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="43" y1="42.5" x2="47" y2="42.5" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <!-- Right Pins -->
    <line x1="58" y1="36.5" x2="62" y2="36.5" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="58" y1="39.5" x2="62" y2="39.5" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="58" y1="42.5" x2="62" y2="42.5" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <!-- Top Pins -->
    <line x1="49.5" y1="30" x2="49.5" y2="34" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="52.5" y1="30" x2="52.5" y2="34" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="55.5" y1="30" x2="55.5" y2="34" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <!-- Bottom Pins -->
    <line x1="49.5" y1="45" x2="49.5" y2="49" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="52.5" y1="45" x2="52.5" y2="49" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />
    <line x1="55.5" y1="45" x2="55.5" y2="49" stroke="#009ee0" stroke-width="1" class="logo-stroke-adapt" />

    <!-- SMT Components -->
    <rect x="21" y="32" width="2" height="5" rx="0.5" fill="none" stroke="#009ee0" stroke-width="0.8" class="logo-stroke-adapt" />
    <rect x="42" y="52" width="5" height="2" rx="0.5" fill="none" stroke="#009ee0" stroke-width="0.8" class="logo-stroke-adapt" />

    <!-- PCB Traces & Nodes -->
    <!-- Trace 1 -->
    <path d="M 23,24 L 28,29 V 35" fill="none" stroke="#009ee0" stroke-width="1" stroke-linecap="round" class="logo-stroke-adapt" />
    <circle cx="23" cy="24" r="1.2" fill="#009ee0" class="logo-text-adapt" />
    <!-- Trace 2 -->
    <path d="M 20,45 L 26,40 H 31" fill="none" stroke="#009ee0" stroke-width="1" stroke-linecap="round" class="logo-stroke-adapt" />
    <circle cx="20" cy="45" r="1.2" fill="#009ee0" class="logo-text-adapt" />
    <!-- Trace 3 -->
    <path d="M 48,21 V 27 L 44,31" fill="none" stroke="#009ee0" stroke-width="1" stroke-linecap="round" class="logo-stroke-adapt" />
    <circle cx="48" cy="21" r="1.2" fill="#009ee0" class="logo-text-adapt" />
    <!-- Trace 4 -->
    <path d="M 58,53 L 53,48 V 44" fill="none" stroke="#009ee0" stroke-width="1" stroke-linecap="round" class="logo-stroke-adapt" />
    <circle cx="58" cy="53" r="1.2" fill="#009ee0" class="logo-text-adapt" />
  </g>

  <!-- TEXT SECTION -->
  <!-- MUREX Text -->
  <text x="82" y="44" font-family="'Poppins', 'Inter', sans-serif" font-weight="700" font-size="30" fill="#009ee0" class="logo-text-adapt">MUREX</text>

  <!-- Data Line Wave over REX -->
  <path d="M 138,20 C 148,6 160,26 172,13 C 182,1 192,21 200,10" fill="none" stroke="#009ee0" stroke-width="2" stroke-linecap="round" class="logo-stroke-adapt" />
  <circle cx="138" cy="20" r="3" fill="#e22a7a" />
  <circle cx="152" cy="11" r="2.5" fill="#009ee0" />
  <circle cx="168" cy="17" r="2.5" fill="#e22a7a" />
  <circle cx="184" cy="7" r="3" fill="#009ee0" />
  <circle cx="200" cy="10" r="3.5" fill="#e22a7a" />

  <!-- ENGINEERING & CONSULTING Stacked Text -->
  <text x="138" y="59" font-family="'Inter', sans-serif" font-weight="700" font-size="8.5" letter-spacing="2" fill="#009ee0" class="logo-subtext-adapt" text-anchor="middle">ENGINEERING</text>
  <text x="138" y="70" font-family="'Inter', sans-serif" font-weight="700" font-size="8.5" letter-spacing="2" fill="#009ee0" class="logo-subtext-adapt" text-anchor="middle">CONSULTING</text>
</svg>
