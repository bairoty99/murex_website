<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" dir="ltr">
  <defs>
    <!-- Gradients -->
    <linearGradient id="emblemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#009ee0" />     <!-- Brand Blue -->
      <stop offset="50%" stop-color="#7b2cbf" />    <!-- Purple -->
      <stop offset="100%" stop-color="#e22a7a" />   <!-- Brand Pink -->
    </linearGradient>
    
    <!-- Mask for the Gear to cut it open and have a clean center -->
    <mask id="gearMask">
      <!-- Keep everything white -->
      <rect x="0" y="0" width="80" height="80" fill="white" />
      <!-- Cut out center circle -->
      <circle cx="40" cy="40" r="16" fill="black" />
      <!-- Cut out right section to mimic open gear -->
      <!-- A pie wedge from -60 deg to 45 deg -->
      <path d="M 40,40 L 80,15 A 40,40 0 0,1 78,58 Z" fill="black" />
    </mask>
  </defs>

  <!-- EMBLEM -->
  <!-- Gear Group with Mask -->
  <g mask="url(#gearMask)">
    <!-- Outer teeth (overlapping rounded rectangles rotated) -->
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(30 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(60 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(90 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(120 40 40)" />
    <rect x="35" y="8" width="10" height="64" rx="3" fill="url(#emblemGrad)" transform="rotate(150 40 40)" />
    <!-- Main body ring -->
    <circle cx="40" cy="40" r="23" fill="url(#emblemGrad)" />
  </g>

  <!-- Geometric Emblem (3D Isometric Cube / Hexagon) -->
  <g transform="translate(14, 5)">
    <!-- Faces of the Cube with varying opacities for 3D depth -->
    <path d="M 46,35 L 46,23 L 35.6,29 L 35.6,41 Z" fill="url(#emblemGrad)" opacity="0.3" /> <!-- Top-Left Face -->
    <path d="M 46,35 L 46,23 L 56.4,29 L 56.4,41 Z" fill="url(#emblemGrad)" opacity="0.75" /> <!-- Top-Right Face -->
    <path d="M 46,35 L 35.6,41 L 46,47 L 56.4,41 Z" fill="url(#emblemGrad)" opacity="0.5" /> <!-- Bottom Face -->
    
    <!-- Wireframe Outline -->
    <!-- Outer Hexagon -->
    <path d="M 46,23 L 56.4,29 L 56.4,41 L 46,47 L 35.6,41 L 35.6,29 Z" fill="none" stroke="#009ee0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-stroke-adapt" />
    <!-- Inner Edges -->
    <line x1="46" y1="35" x2="46" y2="23" stroke="#009ee0" stroke-width="2.5" stroke-linecap="round" class="logo-stroke-adapt" />
    <line x1="46" y1="35" x2="35.6" y2="41" stroke="#009ee0" stroke-width="2.5" stroke-linecap="round" class="logo-stroke-adapt" />
    <line x1="46" y1="35" x2="56.4" y2="41" stroke="#009ee0" stroke-width="2.5" stroke-linecap="round" class="logo-stroke-adapt" />
    
    <!-- Central Connective Node -->
    <circle cx="46" cy="35" r="3.5" fill="#7b2cbf" />
  </g>

  <!-- DNA Helix (Rotated and woven) -->
  <g transform="rotate(-15 40 40)">
    <!-- Rungs -->
    <line x1="33" y1="25" x2="47" y2="25" stroke="#e22a7a" stroke-width="1.5" opacity="0.6" />
    <line x1="31" y1="33" x2="49" y2="33" stroke="#e22a7a" stroke-width="1.5" opacity="0.6" />
    <line x1="31" y1="41" x2="49" y2="41" stroke="#009ee0" stroke-width="1.5" opacity="0.6" />
    <line x1="33" y1="49" x2="47" y2="49" stroke="#009ee0" stroke-width="1.5" opacity="0.6" />
    <line x1="37" y1="57" x2="43" y2="57" stroke="#009ee0" stroke-width="1.5" opacity="0.6" />
    
    <!-- Strand 1 -->
    <path d="M 38,15 C 48,25 48,35 38,45 C 28,55 28,65 38,75" fill="none" stroke="url(#emblemGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- Strand 2 -->
    <path d="M 42,15 C 32,25 32,35 42,45 C 52,55 52,65 42,75" fill="none" stroke="url(#emblemGrad)" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Chemical Nodes / Connections (Left side) -->
  <g>
    <!-- Connections -->
    <line x1="16" y1="32" x2="24" y2="42" stroke="url(#emblemGrad)" stroke-width="2.5" />
    <line x1="24" y1="42" x2="16" y2="54" stroke="url(#emblemGrad)" stroke-width="2.5" />
    <line x1="24" y1="42" x2="34" y2="38" stroke="url(#emblemGrad)" stroke-width="2.5" />
    <!-- Dots -->
    <circle cx="16" cy="32" r="3.5" fill="#e22a7a" />
    <circle cx="24" cy="42" r="4.5" fill="#7b2cbf" />
    <circle cx="16" cy="54" r="3.5" fill="#009ee0" />
    <circle cx="34" cy="38" r="3" fill="#009ee0" />
  </g>

  <!-- TEXT SECTION -->
  <!-- MUREX Text -->
  <!-- Letter M -->
  <text x="82" y="44" font-family="'Poppins', 'Inter', sans-serif" font-weight="700" font-size="30" fill="#009ee0" class="logo-text-adapt">M</text>
  
  <!-- Custom U with Chart Nodes -->
  <g transform="translate(112, 10)">
    <!-- Left leg & bottom curve & right leg -->
    <path d="M 0,14 v 10 A 8,8 0 0,0 16,24 v -4" fill="none" stroke="#009ee0" stroke-width="6" stroke-linecap="round" class="logo-stroke-adapt" />
    
    <!-- Chart lines -->
    <line x1="16" y1="20" x2="22" y2="12" stroke="#e22a7a" stroke-width="2.5" stroke-linecap="round" />
    <line x1="22" y1="12" x2="30" y2="18" stroke="#009ee0" stroke-width="2.5" stroke-linecap="round" />
    <line x1="30" y1="18" x2="38" y2="5" stroke="#009ee0" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Chart Nodes (Dots) -->
    <circle cx="16" cy="20" r="3" fill="#009ee0" class="logo-text-adapt" />
    <circle cx="22" cy="12" r="3" fill="#e22a7a" />
    <circle cx="30" cy="18" r="3" fill="#7b2cbf" />
    <circle cx="38" cy="5" r="4" fill="#009ee0" />
  </g>

  <!-- Letters REX -->
  <text x="156" y="44" font-family="'Poppins', 'Inter', sans-serif" font-weight="700" font-size="30" fill="#009ee0" class="logo-text-adapt">REX</text>

  <!-- ENGINEERING CONSULTING Text -->
  <text x="82" y="62" font-family="'Inter', sans-serif" font-weight="600" font-size="9" letter-spacing="1.2" fill="#009ee0" class="logo-subtext-adapt">ENGINEERING CONSULTING</text>
</svg>
